<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>安居集团会员积分运营管理平台 - 登录</title>
  <link rel="stylesheet" href="resources/style.css">
  <style>
    body {
      min-width: 1180px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 24px 0 28px;
      overflow: hidden;
      background:
        linear-gradient(rgba(38, 169, 221, .13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(38, 169, 221, .13) 1px, transparent 1px),
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.92) 0 12%, rgba(220,244,255,.84) 44%, rgba(233,248,255,.78) 100%),
        linear-gradient(180deg, #cdeefa 0%, #edf9ff 48%, #dff2fb 100%);
      background-size: 56px 56px, 56px 56px, auto, auto;
    }
    body::before {
      content: "";
      position: fixed;
      left: -3vw;
      right: -3vw;
      bottom: 0;
      height: 46vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.66) 30%, rgba(255,255,255,.28) 100%),
        linear-gradient(90deg, rgba(9,112,174,.14), rgba(0,179,207,.10)),
        repeating-linear-gradient(90deg, rgba(7,95,158,.16) 0 18px, transparent 18px 56px);
      filter: blur(8px);
      opacity: .72;
      clip-path: polygon(0 52%, 6% 50%, 6% 35%, 9% 35%, 9% 50%, 14% 49%, 14% 38%, 17% 38%, 17% 48%, 22% 47%, 22% 32%, 24% 32%, 24% 47%, 29% 46%, 29% 22%, 32% 22%, 32% 46%, 37% 45%, 37% 35%, 40% 35%, 40% 45%, 48% 44%, 48% 12%, 51% 12%, 51% 44%, 58% 45%, 58% 37%, 61% 37%, 61% 46%, 68% 47%, 68% 39%, 72% 39%, 72% 48%, 80% 50%, 80% 43%, 85% 43%, 85% 51%, 100% 54%, 100% 100%, 0 100%);
      pointer-events: none;
    }
    .login-shell {
      position: relative;
      z-index: 1;
      display: contents;
    }
    .login-title {
      position: relative;
      z-index: 1;
      display: block;
      text-align: center;
      color: #0b2f4f;
      font-size: 30px;
      font-weight: 800;
      line-height: 1.18;
    }
    .login-panel {
      position: relative;
      z-index: 1;
      width: 480px;
      padding: 34px 36px 36px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border: 1px solid rgba(170, 211, 235, .9);
      border-top: 4px solid var(--brand-2);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,.94);
      box-shadow: 0 22px 50px rgba(36, 102, 136, .20);
    }
    .login-panel h2 {
      margin: 0 0 8px;
      color: var(--navy);
      font-size: 24px;
    }
    .login-panel .sub {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 13px;
    }
    .login-form {
      display: grid;
      gap: 16px;
    }
    .login-form .field input {
      height: 42px;
      font-size: 15px;
    }
    .captcha-row {
      display: grid;
      grid-template-columns: 1fr 112px;
      gap: 10px;
      align-items: center;
    }
    .captcha-code {
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #c9e1ee;
      border-radius: 5px;
      background: linear-gradient(135deg, #eefaff, #cdeefa);
      color: #173a56;
      font-weight: 800;
      letter-spacing: 4px;
    }
    .login-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
    }
    .login-options label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .login-button {
      height: 46px;
      margin-top: 4px;
      font-size: 16px;
      font-weight: 800;
      border-radius: 6px;
    }
    .login-foot {
      position: relative;
      z-index: 1;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <div class="login-title">会员积分运营管理平台</div>
    <section class="login-panel">
      <h2>账号登录</h2>
      <p class="sub">请使用集团统一账号登录，操作记录将进入后台审计。</p>
      <form class="login-form" id="loginForm">
        <div class="field"><label>账号</label><input id="account" autocomplete="username" value="" placeholder="请输入账号或手机号"></div>
        <div class="field"><label>密码</label><input id="password" type="password" autocomplete="current-password" value="" placeholder="请输入 6 位以上密码"></div>
        <div class="field">
          <label>验证码</label>
          <div class="captcha-row">
            <input id="captcha" placeholder="请输入验证码">
            <span class="captcha-code">A7K3</span>
          </div>
        </div>
        <div class="login-options">
          <label><input type="checkbox" checked> 记住帐号</label>
          <span>忘记密码</span>
        </div>
        <button class="btn primary login-button" type="submit">登录</button>
      </form>
    </section>
  </main>
  <div class="login-foot">深圳市属国有独资保障性住房专营机构</div>
  <script>
    document.getElementById("loginForm").addEventListener("submit", event => {
      event.preventDefault();
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
