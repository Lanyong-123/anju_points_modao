<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>商品审核处理</title><link rel="stylesheet" href="../resources/style.css"><link rel="stylesheet" href="../resources/task-audit.css"></head>
<body><div class="page"><div class="panel-hd" style="padding:0 0 14px;border:0;background:transparent"><h3 id="pageTitle">商品审核处理</h3><button class="btn" id="backBtn">返回待审核</button></div><div class="task-process-layout"><div>
<div class="panel"><div class="panel-hd"><h3 id="detailTitle">商品申请详情</h3><span class="badge gold" id="statusBadge">待审核</span></div><div class="panel-bd"><div class="detail-list" id="detailList"></div><div class="task-change-note" id="changeNote" style="margin-top:16px"></div></div></div>
<div class="panel" style="margin-top:16px"><div class="panel-hd"><h3>审核记录</h3></div><div class="panel-bd"><table class="task-record-table"><thead><tr><th>审核时间</th><th>审核状态</th><th>审核人</th><th>审核意见</th></tr></thead><tbody id="recordRows"><tr><td>-</td><td><span class="badge gold">待审核</span></td><td>-</td><td>等待审核处理</td></tr></tbody></table></div></div>
</div><div class="panel"><div class="panel-hd"><h3>审核操作</h3></div><div class="panel-bd"><div class="field"><label><span style="color:#e5484d">*</span> 审核结果</label><div class="task-audit-options"><label><input type="radio" name="result" value="pass" checked>审核通过</label><label><input type="radio" name="result" value="reject">审核不通过</label></div></div><div class="notice" id="auditNotice" style="margin-top:14px"></div><div class="field" style="margin-top:16px"><label><span style="color:#e5484d">*</span> 审核意见</label><textarea class="task-opinion" id="auditOpinion"></textarea></div><div class="task-process-actions"><button class="btn" id="cancelBtn">取消</button><button class="btn primary" id="submitBtn">确认提交</button></div></div></div></div></div>
<div class="modal-mask" id="successModal"><div class="modal" style="width:460px"><div class="panel-hd"><h3>处理完成</h3><button class="btn" data-close-modal>关闭</button></div><div class="panel-bd"><div class="notice"><strong id="successResult">审核通过</strong>审核结果已提交，任务已转入已处理列表。</div></div><div class="modal-ft"><button class="btn primary" id="doneBtn">返回待审核</button></div></div></div>
<script>window.TASK_AUDIT_CONFIG={defaultAction:"publish",actions:{publish:{type:"商品发布审核",note:"新建场地预约权益商品并申请发布。",passMessage:"商品进入待开始状态，并按兑换有效期自动上架。",fields:[["业务单号","PRD202605250036"],["商品编号","PR202605250036"],["商品名称","场地预约权益"],["兑换积分","500积分"],["礼券归属","物业板块 / 南山片区 / 高新花园"],["库存","500"],["是否特定人群发放","否"],["兑换有效期","2026-06-01 至 2026-12-31"],["提交人","商品专员"],["提交时间","2026-05-25 17:35"]]},edit:{type:"商品修改审核",note:"兑换积分由2,500积分调整为2,000积分。",passMessage:"商品修改内容生效，后续兑换按新规则执行。",fields:[["业务单号","PRD202605250031"],["商品编号","PR202606050018"],["商品名称","2000积分兑家政服务"],["原兑换积分","2,500积分"],["修改后兑换积分","2,000积分"],["礼券归属","商业板块 / 南山片区 / 高新安荟邻"],["剩余库存","838"],["提交人","商品专员"],["提交时间","2026-05-25 16:48"]]},disable:{type:"商品禁用审核",note:"合作商户服务调整，申请暂停第三方礼券商品兑换。",passMessage:"商品状态变更为禁用，会员端停止展示和兑换。",fields:[["业务单号","PRD202605250027"],["商品编号","PR202605120027"],["商品名称","第三方礼券"],["兑换积分","1,000积分"],["礼券归属","商业板块 / 福田片区 / 景田安荟邻"],["当前状态","进行中"],["剩余库存","624"],["提交人","商品主管"],["提交时间","2026-05-25 15:16"]]},enable:{type:"商品启用审核",note:"服务资源恢复，申请重新启用免费搬家商品。",passMessage:"商品状态变更为启用，会员端恢复展示和兑换。",fields:[["业务单号","PRD202605250023"],["商品编号","PR202605180023"],["商品名称","免费搬家服务"],["兑换积分","免费"],["礼券归属","住宅板块 / 坪山片区 / 秀馨苑"],["当前状态","禁用"],["剩余库存","90"],["提交人","商品主管"],["提交时间","2026-05-25 14:30"]]}}};</script><script src="../plugins/task-audit.js"></script></body></html>
