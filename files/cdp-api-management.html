<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据API管理</title>
  <link rel="stylesheet" href="../resources/style.css">
  <style>
    .api-filter {
      grid-template-columns: repeat(4, minmax(0, 1fr)) auto auto;
    }
    .api-table th,
    .api-table td {
      padding: 10px 8px;
      vertical-align: middle;
    }
    .api-name {
      display: grid;
      gap: 4px;
      white-space: normal;
    }
    .api-name strong {
      color: var(--navy);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="filter api-filter">
      <div class="field"><label>API名称</label><input placeholder="请输入API名称"></div>
      <div class="field"><label>接入系统</label><select><option>全部系统</option><option>智能客服系统</option><option>营销管理系统</option><option>权益中心</option><option>第三方业务系统</option></select></div>
      <div class="field"><label>API状态</label><select><option>全部状态</option><option>启用</option><option>停用</option><option>调试中</option></select></div>
      <div class="field"><label>调用时间</label><input value="2026-06-01 至 2026-06-09"></div>
      <button class="btn primary">查询</button>
      <button class="btn">重置</button>
    </div>

    <div class="panel">
      <div class="panel-hd">
        <h3>画像标签API列表</h3>
      </div>
      <div class="panel-bd">
        <table class="api-table">
          <thead>
            <tr>
              <th>API名称</th>
              <th>调用系统</th>
              <th>调用限额</th>
              <th>今日调用</th>
              <th>累计调用</th>
              <th>成功率</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><div class="api-name"><strong>客户基础画像查询</strong></div></td>
              <td>智能客服系统、管理端</td>
              <td>50,000 次/日</td>
              <td><span class="link">8,920</span></td>
              <td>286,420</td>
              <td><span class="badge green">99.6%</span></td>
            </tr>
            <tr>
              <td><div class="api-name"><strong>画像标签批量查询</strong></div></td>
              <td>营销管理系统</td>
              <td>100,000 次/日</td>
              <td><span class="link">12,680</span></td>
              <td>528,306</td>
              <td><span class="badge green">99.1%</span></td>
            </tr>
            <tr>
              <td><div class="api-name"><strong>高价值客户标签查询</strong></div></td>
              <td>权益中心、第三方业务系统</td>
              <td>30,000 次/日</td>
              <td><span class="link">2,486</span></td>
              <td>96,812</td>
              <td><span class="badge green">98.8%</span></td>
            </tr>
            <tr>
              <td><div class="api-name"><strong>精准营销人群同步</strong></div></td>
              <td>营销管理系统</td>
              <td>10,000 次/日</td>
              <td><span class="link">594</span></td>
              <td>24,180</td>
              <td><span class="badge">调试中</span></td>
            </tr>
          </tbody>
        </table>
        <div class="pagination"><span>共 18 条</span><button class="page-btn">上一页</button><button class="page-btn active">1</button><button class="page-btn">2</button><button class="page-btn">下一页</button><select><option>10 条/页</option></select></div>

      </div>
    </div>
  </div>

</body>
</html>
