<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据字典</title>
  <link rel="stylesheet" href="../resources/style.css">
  <style>
    .dict-filter {
      grid-template-columns: 1fr 1.3fr auto auto;
    }
    .dict-code {
      color: #526477;
      font-family: Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .dict-parent {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 2px 8px;
      border-radius: 5px;
      background: #f4f7fb;
      color: var(--navy);
      font-size: 12px;
      font-weight: 800;
    }
    .dict-action-list {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }
    .dict-modal {
      width: min(760px, calc(100vw - 48px));
    }
    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 20;
      display: none;
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 6px;
      background: #123152;
      color: #fff;
      box-shadow: 0 14px 32px rgba(18,49,82,.22);
      font-size: 13px;
      font-weight: 700;
    }
    .toast.open {
      display: block;
    }
    @media (max-width: 1180px) {
      .dict-filter { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="filter dict-filter">
      <div class="field">
        <label>字典类型</label>
        <select id="typeFilter">
          <option>全部类型</option>
          <option>会员状态</option>
          <option>会员等级</option>
          <option>积分业务类型</option>
          <option>优惠券状态</option>
        </select>
      </div>
      <div class="field"><label>关键字</label><input id="keywordFilter" placeholder="请输入编码/名称/父类关键字"></div>
      <button class="btn primary" id="queryBtn">查询</button>
      <button class="btn" id="resetBtn">重置</button>
    </div>

    <div class="panel">
      <div class="panel-hd">
        <h3>数据字典列表</h3>
        <div class="toolbar">
          <button class="btn primary" data-open-dict="create">新增字典</button>
          <button class="btn" data-batch-delete>批量删除</button>
        </div>
      </div>
      <div class="panel-bd">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="checkAll"></th>
              <th>序号</th>
              <th>编码</th>
              <th>名称</th>
              <th>父类名称（编码）</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="dictRows"></tbody>
        </table>
        <div class="pagination"><span id="rowCount">共 0 条</span><span>每页</span><select><option selected>20 条</option></select><button class="page-btn active">1</button></div>
      </div>
    </div>
  </div>

  <div class="modal-mask" id="dictModal">
    <div class="modal dict-modal">
      <div class="panel-hd"><h3 id="dictModalTitle">新增字典</h3><button class="btn" data-close-modal>关闭</button></div>
      <div class="panel-bd">
        <div class="grid cols-2">
          <div class="field"><label class="required">字典类型</label><select id="dictType"><option>会员状态</option><option>会员等级</option><option>积分业务类型</option><option>优惠券状态</option></select></div>
          <div class="field"><label class="required">编码</label><input id="dictCode" placeholder="请输入编码"></div>
          <div class="field"><label class="required">名称</label><input id="dictName" placeholder="请输入名称"></div>
          <div class="field"><label>父类名称（编码）</label><input id="dictParent" placeholder="无（ROOT）"></div>
        </div>
      </div>
      <div class="modal-ft"><button class="btn" data-close-modal>取消</button><button class="btn primary" id="saveDictBtn">确认保存</button></div>
    </div>
  </div>

  <div class="modal-mask" id="deleteModal">
    <div class="modal">
      <div class="panel-hd"><h3 id="deleteTitle">删除字典</h3><button class="btn" data-close-modal>关闭</button></div>
      <div class="panel-bd"><p id="deleteText" style="color:#526477; line-height:1.7">确认删除所选字典？删除后仅用于原型展示，不会影响真实数据。</p></div>
      <div class="modal-ft"><button class="btn" data-close-modal>取消</button><button class="btn primary" id="confirmDeleteBtn">确认删除</button></div>
    </div>
  </div>

  <div class="toast" id="toast">操作成功</div>

  <script>
    const defaultDicts = [
      { type: "会员状态", code: "member_status_enabled", name: "启用", parent: "会员状态（member_status）" },
      { type: "会员状态", code: "member_status_disabled", name: "禁用", parent: "会员状态（member_status）" },
      { type: "会员等级", code: "member_level_gold", name: "V3远近闻名", parent: "会员等级（member_level）" },
      { type: "会员等级", code: "member_level_black_gold", name: "V4名扬四海", parent: "会员等级（member_level）" },
      { type: "积分业务类型", code: "points_biz_get", name: "积分获取", parent: "积分业务类型（points_biz_type）" },
      { type: "积分业务类型", code: "points_biz_consume", name: "积分消耗", parent: "积分业务类型（points_biz_type）" },
      { type: "优惠券状态", code: "coupon_status_unused", name: "未使用", parent: "优惠券状态（coupon_status）" },
      { type: "优惠券状态", code: "coupon_status_used", name: "已核销", parent: "优惠券状态（coupon_status）" }
    ];

    let dicts = defaultDicts.map(item => ({ ...item }));
    let currentRows = [];
    let editingCode = "";
    let deleteMode = "single";
    let deleteCode = "";

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("open");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("open"), 1600);
    }

    function getRows() {
      const type = document.getElementById("typeFilter").value;
      const keyword = document.getElementById("keywordFilter").value.trim().toLowerCase();
      return dicts.filter(item => {
        const matchType = type === "全部类型" || item.type === type;
        const matchKeyword = !keyword || [item.code, item.name, item.parent].some(value => value.toLowerCase().includes(keyword));
        return matchType && matchKeyword;
      });
    }

    function refreshCheckAll() {
      const checks = [...document.querySelectorAll("[data-row-check]")];
      const checkAll = document.getElementById("checkAll");
      checkAll.checked = checks.length > 0 && checks.every(item => item.checked);
      checkAll.indeterminate = checks.some(item => item.checked) && !checkAll.checked;
    }

    function renderRows() {
      currentRows = getRows();
      document.getElementById("dictRows").innerHTML = currentRows.map((item, index) => `
        <tr>
          <td><input type="checkbox" data-row-check="${item.code}"></td>
          <td>${index + 1}</td>
          <td><span class="dict-code">${item.code}</span></td>
          <td><strong>${item.name}</strong></td>
          <td><span class="dict-parent">${item.parent || "无（ROOT）"}</span></td>
          <td><div class="dict-action-list"><span class="link" data-open-dict="edit" data-code="${item.code}">修改</span><span class="link danger" data-delete="${item.code}">删除</span></div></td>
        </tr>
      `).join("");
      document.getElementById("rowCount").textContent = `共 ${currentRows.length} 条`;
      document.getElementById("checkAll").checked = false;
      document.getElementById("checkAll").indeterminate = false;
      bindRowActions();
    }

    function bindRowActions() {
      document.querySelectorAll("[data-row-check]").forEach(el => el.addEventListener("change", refreshCheckAll));
      document.querySelectorAll("[data-open-dict='edit']").forEach(el => {
        el.addEventListener("click", () => openDictModal("edit", el.dataset.code));
      });
      document.querySelectorAll("[data-delete]").forEach(el => {
        el.addEventListener("click", () => openDeleteModal("single", el.dataset.delete));
      });
    }

    function openDictModal(mode, code = "") {
      const modal = document.getElementById("dictModal");
      const title = document.getElementById("dictModalTitle");
      editingCode = mode === "edit" ? code : "";
      title.textContent = mode === "edit" ? "修改字典" : "新增字典";
      const item = dicts.find(row => row.code === code) || { type: "会员状态", code: "", name: "", parent: "" };
      document.getElementById("dictType").value = item.type;
      document.getElementById("dictCode").value = item.code;
      document.getElementById("dictName").value = item.name;
      document.getElementById("dictParent").value = item.parent;
      modal.classList.add("open");
    }

    function openDeleteModal(mode, code = "") {
      deleteMode = mode;
      deleteCode = code;
      const checkedCount = document.querySelectorAll("[data-row-check]:checked").length;
      document.getElementById("deleteTitle").textContent = mode === "batch" ? "批量删除字典" : "删除字典";
      document.getElementById("deleteText").textContent = mode === "batch" ? `确认删除已选 ${checkedCount} 条字典？` : "确认删除该字典？";
      document.getElementById("deleteModal").classList.add("open");
    }

    document.getElementById("queryBtn").addEventListener("click", renderRows);
    document.getElementById("resetBtn").addEventListener("click", () => {
      document.getElementById("typeFilter").value = "全部类型";
      document.getElementById("keywordFilter").value = "";
      renderRows();
    });
    document.querySelector("[data-open-dict='create']").addEventListener("click", () => openDictModal("create"));
    document.getElementById("checkAll").addEventListener("change", event => {
      document.querySelectorAll("[data-row-check]").forEach(item => item.checked = event.target.checked);
      refreshCheckAll();
    });
    document.querySelector("[data-batch-delete]").addEventListener("click", () => {
      const checkedCount = document.querySelectorAll("[data-row-check]:checked").length;
      if (!checkedCount) {
        showToast("请先选择需要删除的字典");
        return;
      }
      openDeleteModal("batch");
    });
    document.getElementById("saveDictBtn").addEventListener("click", () => {
      const item = {
        type: document.getElementById("dictType").value,
        code: document.getElementById("dictCode").value.trim() || "dict_new_code",
        name: document.getElementById("dictName").value.trim() || "新字典项",
        parent: document.getElementById("dictParent").value.trim() || "无（ROOT）"
      };
      if (editingCode) {
        const index = dicts.findIndex(row => row.code === editingCode);
        if (index >= 0) dicts[index] = item;
        showToast("字典已修改");
      } else {
        dicts.unshift(item);
        showToast("字典已新增");
      }
      document.getElementById("dictModal").classList.remove("open");
      renderRows();
    });
    document.getElementById("confirmDeleteBtn").addEventListener("click", () => {
      if (deleteMode === "batch") {
        const codes = [...document.querySelectorAll("[data-row-check]:checked")].map(item => item.dataset.rowCheck);
        dicts = dicts.filter(item => !codes.includes(item.code));
        showToast("已批量删除所选字典");
      } else {
        dicts = dicts.filter(item => item.code !== deleteCode);
        showToast("字典已删除");
      }
      document.getElementById("deleteModal").classList.remove("open");
      renderRows();
    });
    document.querySelectorAll("[data-close-modal]").forEach(el => {
      el.addEventListener("click", () => el.closest(".modal-mask").classList.remove("open"));
    });
    renderRows();
  </script>
</body>
</html>
